name: CD — Backend

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: ["main"]

concurrency:
  group: cd-backend-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/jkelectricals-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/jkelectricals-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/jkelectricals-backend:buildcache,mode=max

  deploy-to-ec2:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE="${{ secrets.DOCKER_USERNAME }}/jkelectricals-backend:${{ needs.build-and-push.outputs.image-tag }}"

            docker pull "$IMAGE"

            docker stop jkelectricals-backend 2>/dev/null || true
            docker rm   jkelectricals-backend 2>/dev/null || true

            docker run -d \
              --name jkelectricals-backend \
              --restart unless-stopped \
              -p 5000:5000 \
              --env-file /home/ubuntu/.env \
              "$IMAGE"

            # Remove unused images to free disk space
            docker image prune -f

      - name: Verify deployment health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Waiting for container to be healthy..."
            sleep 5
            STATUS=$(docker inspect --format='{{.State.Status}}' jkelectricals-backend 2>/dev/null)
            if [ "$STATUS" != "running" ]; then
              echo "Container is not running! Status: $STATUS"
              docker logs jkelectricals-backend --tail 50
              exit 1
            fi
            echo "Container is running."
            curl -sf http://localhost:5000/api/health || (echo "Health check failed!" && exit 1)
            echo "Health check passed."
